services:
  - type: web
    runtime: node
    name: collaborative-study-room-api
    plan: starter
    region: oregon
    healthCheckPath: /health
    buildCommand: cd backend && npm ci && npm run build
    preDeployCommand: cd backend && npm run db:migrate
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: collaborative-study-room-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        fromService:
          name: collaborative-study-room-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: SOCKET_IO_CORS_ORIGIN
        fromService:
          name: collaborative-study-room-web
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    runtime: static
    name: collaborative-study-room-web
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: collaborative-study-room-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SOCKET_URL
        fromService:
          name: collaborative-study-room-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: collaborative-study-room-db
    databaseName: studyroom
    user: studyroom_user
    plan: basic-256mb
    region: oregon
